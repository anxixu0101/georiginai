<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GEORIGIN — Blog</title>
  <meta name="theme-color" content="#f4f4f2" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DotGothic16&display=swap" rel="stylesheet">

  <!-- Markdown 渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- 代码高亮 -->
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>

  <style>
    :root {
      --cream: #f4f4f2;
      --apricot: #e9e9e6;
      --mist: #dededb;
      --ink: #1a1a1a;
      --muted: #8a8a86;
      --peach: #ff4d00;
      --peach-deep: #d63f00;
      --screen: #1d1d1b;
      --r: 24px;
      --r-sm: 16px;
      --soft-shadow: 0 14px 40px rgba(63, 58, 54, .08);
      --max: 1080px;
      --round: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
      --px: 'DotGothic16', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--round);
      color: var(--ink);
      background: var(--cream);
      line-height: 1.8;
    }

    a { color: inherit; text-decoration: none; }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 24px; }

    /* ===== 顶部导航（完全复用主页风格） ===== */
    .teHeader {
      background: #000;
      color: #fff;
      padding: 34px 0 38px;
    }
    .teHeader a { color: #fff; }
    .teHeader a:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ★ 对齐修复：baseline 改 center，去掉魔法边距，
       品牌名和 product/blog/contact 严格一条线（与 index 一致） */
    .teGrid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr 1.2fr;
      gap: 52px;
      align-items: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', sans-serif;
      font-weight: 400;
    }

    .teBrand {
      font-size: clamp(28px, 2.8vw, 38px);
      line-height: 1;
      letter-spacing: -.5px;
      text-transform: uppercase;
    }

    .teCol {
      display: flex;
      flex-direction: row;
      gap: 18px;
      align-items: center;
    }

    .teCol .icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .teCol .icon svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      stroke-width: 1.2;
      fill: none;
    }

    .teCol h5 {
      margin: 0;
      font-size: clamp(24px, 2.4vw, 32px);
      font-weight: 400;
      line-height: 1;
      text-transform: lowercase;
      letter-spacing: -.5px;
    }

    /* ===== 图标交互 1：拨杆开关（product）=====
       hover 向左拨，离开后用过冲缓动"弹"回原位 */
    .lever {
      transform-box: view-box;
      transform-origin: 20px 30px;
      transform: rotate(0deg);
      transition: transform .55s cubic-bezier(.3, 2.2, .4, .85);
    }

    .teCol:hover .lever {
      transform: rotate(-34deg);
      transition: transform .14s ease-out;
    }

    /* ===== 图标交互 2：毫米波雷达（blog）=====
       动画常驻但默认暂停，hover 播放，离开停在当前角度 */
    .sweep {
      transform-box: view-box;
      transform-origin: 20px 20px;
      animation: te-sweep 1.8s linear infinite;
      animation-play-state: paused;
    }

    .teCol:hover .sweep { animation-play-state: running; }

    @keyframes te-sweep {
      to { transform: rotate(360deg); }
    }

    /* ===== 图标交互 3：握手（contact）=====
       默认分开，hover 合拢相扣并轻晃，离开松开 */
    .handL,
    .handR {
      transition: transform .3s cubic-bezier(.4, 1.4, .5, 1);
    }

    .handL { transform: translateX(-4.5px); }
    .handR { transform: translateX(4.5px); }

    .teCol:hover .handL,
    .teCol:hover .handR { transform: translateX(0); }

    .teCol:hover .shake { animation: te-shake .55s ease-in-out infinite; }

    @keyframes te-shake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.6px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .lever, .handL, .handR { transition: none; }
      .sweep { animation: none; }
      .teCol:hover .shake { animation: none; }
    }

    .pxlabel {
      font-family: var(--px);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--peach-deep);
    }

    /* ===== 内容区 ===== */
    .postCard {
      background: #fff;
      border-radius: var(--r);
      padding: 42px 48px;
      box-shadow: var(--soft-shadow);
      margin-top: 20px;
    }

    .postMeta {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .metaText {
      font-family: var(--px);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .prose {
      font-size: 17px;
      line-height: 1.9;
      color: var(--ink);
      max-width: 78ch;
    }

    .prose h1, .prose h2, .prose h3 {
      letter-spacing: -.3px;
      margin: 1.4em 0 .6em;
    }

    .prose h2 { font-size: 24px; }
    .prose h3 { font-size: 20px; }

    .prose p { margin: 0 0 18px; }

    .prose a {
      color: var(--peach-deep);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .prose code {
      font-family: var(--px);
      background: var(--apricot);
      padding: 2px 7px;
      border-radius: 6px;
      font-size: 15px;
    }

    .prose pre {
      background: #1d1d1b;
      color: #f4f4f2;
      padding: 20px;
      border-radius: 16px;
      overflow-x: auto;
      margin: 20px 0;
    }

    .prose img {
      max-width: 100%;
      border-radius: 16px;
      margin: 24px 0;
      border: 1px solid var(--mist);
    }

    .backLink {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 20px;
    }

    .backLink:hover {
      color: var(--ink);
    }

    /* ---------- responsive（窄屏头部塌栏） ---------- */
    @media (max-width: 1000px) {
      .teGrid {
        grid-template-columns: 1fr 1fr;
        row-gap: 30px;
      }
    }

    @media (max-width: 560px) {
      .teGrid { grid-template-columns: 1fr; }
      .teHeader { padding: 26px 0; }
      .postCard { padding: 24px; }
    }
  </style>
</head>

<body>

  <!-- ===== 顶部导航（与主页完全一致） ===== -->
  <div class="teHeader">
    <div class="wrap">
      <div class="teGrid">
        <div class="teBrand"><a href="index.html">GEORIGIN</a></div>

        <div class="teCol">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 40 40">
              <rect x="11" y="28" width="18" height="6" rx="2" />
              <circle cx="20" cy="30" r="1.2" />
              <g class="lever">
                <line x1="20" y1="30" x2="20" y2="13" />
                <circle cx="20" cy="10" r="3.4" />
              </g>
            </svg>
          </div>
          <h5><a href="index.html#how">product</a></h5>
        </div>

        <div class="teCol">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="5" />
              <circle cx="20" cy="20" r="10" />
              <circle cx="20" cy="20" r="15" />
              <circle cx="20" cy="20" r="1.2" />
              <g class="sweep">
                <line x1="20" y1="20" x2="20" y2="5" />
              </g>
            </svg>
          </div>
          <h5><a href="blog.html">blog</a></h5>
        </div>

        <div class="teCol">
          <div class="icon" aria-hidden="true">
            <svg viewBox="0 0 40 40">
              <g class="shake">
                <g class="handL">
                  <line x1="2" y1="20" x2="10" y2="20" />
                  <rect x="10" y="16" width="12" height="8" rx="3.5" />
                  <line x1="14" y1="16" x2="14" y2="13" />
                  <line x1="17" y1="16" x2="17" y2="24" />
                  <line x1="20" y1="16" x2="20" y2="24" />
                </g>
                <g class="handR">
                  <line x1="38" y1="24" x2="30" y2="24" />
                  <rect x="18" y="20" width="12" height="8" rx="3.5" />
                  <line x1="26" y1="28" x2="26" y2="31" />
                  <line x1="23" y1="20" x2="23" y2="28" />
                  <line x1="20" y1="20" x2="20" y2="28" />
                </g>
              </g>
            </svg>
          </div>
          <h5><a href="index.html#contact">contact</a></h5>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 文章内容区 ===== -->
  <main class="wrap" style="padding-top: 40px; padding-bottom: 80px;">
    <a href="blog.html" class="backLink">← Back to all posts</a>

    <div class="postCard">
      <div class="postMeta">
        <span class="pxlabel" id="post-meta-chip" style="display:none;"></span>
        <span class="metaText" id="post-meta-text"></span>
      </div>

      <h1 id="post-title" style="margin: 12px 0 24px; font-size: clamp(28px, 3.2vw, 42px);"></h1>

      <div id="post-content" class="prose">
        Loading content…
      </div>
    </div>
  </main>

  <script>
    document.getElementById('y') && (document.getElementById('y').textContent = new Date().getFullYear());

    const params = new URLSearchParams(window.location.search);
    const file = params.get("p");

    const contentEl = document.getElementById("post-content");
    const titleEl = document.getElementById("post-title");
    const metaText = document.getElementById("post-meta-text");
    const metaChip = document.getElementById("post-meta-chip");

    marked.setOptions({ breaks: false, gfm: true });

    function setMeta(text) {
      if (!text) return;
      metaText.textContent = text;
      if (/[Λ⊗Σ]/.test(text)) {
        metaChip.style.display = "inline-flex";
        metaChip.textContent = text.match(/[Λ⊗Σ].*/)?.[0] ?? "Λ ⊗ Σ";
      }
    }

    if (!file) {
      titleEl.innerText = "No post specified";
      contentEl.innerText = "Please use ?p=filename.md";
    } else {
      fetch(`posts/${file}`)
        .then(res => {
          if (!res.ok) throw new Error("Not found");
          return res.text();
        })
        .then(md => {
          const html = marked.parse(md);
          contentEl.innerHTML = html;

          // 提取标题
          const h1 = contentEl.querySelector("h1");
          if (h1) {
            titleEl.innerText = h1.innerText;
            h1.remove();
          } else {
            titleEl.innerText = file.replace(".md", "");
          }

          // 提取 meta
          const firstStrong = contentEl.querySelector("strong");
          if (firstStrong) {
            setMeta(firstStrong.innerText);
            firstStrong.remove();
          }

          // 代码高亮
          if (window.Prism) Prism.highlightAll();
        })
        .catch(() => {
          titleEl.innerText = "Post not found";
          contentEl.innerText = `posts/${file} does not exist.`;
          metaText.textContent = "";
        });
    }
  </script>

</body>
</html>
