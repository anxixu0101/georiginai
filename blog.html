<!doctype html>
<html lang="en">
<!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-VtGymhXEd_t_UzvUQD2xo.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GEORIGIN — Blog</title>
  <meta name="description" content="Build logs, notes, and field reports from GEORIGIN." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #f4f4f2;
      --apricot: #e9e9e6;
      --mist: #dededb;
      --ink: #1a1a1a;
      --muted: #8a8a86;
      --peach: #ff4d00;
      --peach-deep: #d63f00;
      --r: 24px;
      --soft-shadow: 0 14px 40px rgba(63, 58, 54, .08);
      --max: 1080px;
      --round: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
      --px: 'DotGothic16', monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--round);
      color: var(--ink);
      background: var(--cream);
      line-height: 1.8;
    }

    a { color: inherit; text-decoration: none; }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 0 24px; }

    /* 顶部导航 */
    .teHeader {
      background: #000;
      color: #fff;
      padding: 34px 0 38px;
    }
    .teHeader a { color: #fff; }
    .teHeader a:hover { text-decoration: underline; text-underline-offset: 3px; }

    /* ★ 对齐修复：baseline 改 center，去掉魔法边距，
       品牌名和 product/blog/contact 严格一条线（与 index/posts 一致） */
    .teGrid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr 1fr 1.2fr;
      gap: 52px;
      align-items: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, 'Hiragino Sans', sans-serif;
      font-weight: 400;
    }

    .teBrand {
      font-size: clamp(28px, 2.8vw, 38px);
      line-height: 1;
      letter-spacing: -.5px;
      text-transform: uppercase;
    }

    .teCol {
      display: flex;
      flex-direction: row;
      gap: 18px;
      align-items: center;
    }

    .teCol .icon {
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .teCol .icon svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      stroke-width: 1.2;
      fill: none;
    }

    .teCol h5 {
      margin: 0;
      font-size: clamp(24px, 2.4vw, 32px);
      font-weight: 400;
      line-height: 1;
      text-transform: lowercase;
      letter-spacing: -.5px;
    }

    /* ===== 图标交互 1：拨杆开关（product）=====
       hover 向左拨，离开后用过冲缓动"弹"回原位 */
    .lever {
      transform-box: view-box;
      transform-origin: 20px 30px;
      transform: rotate(0deg);
      transition: transform .55s cubic-bezier(.3, 2.2, .4, .85);
    }

    .teCol:hover .lever {
      transform: rotate(-34deg);
      transition: transform .14s ease-out;
    }

    /* ===== 图标交互 2：毫米波雷达（blog）=====
       动画常驻但默认暂停，hover 播放，离开停在当前角度 */
    .sweep {
      transform-box: view-box;
      transform-origin: 20px 20px;
      animation: te-sweep 1.8s linear infinite;
      animation-play-state: paused;
    }

    .teCol:hover .sweep { animation-play-state: running; }

    @keyframes te-sweep {
      to { transform: rotate(360deg); }
    }

    /* ===== 图标交互 3：握手（contact）=====
       默认分开，hover 合拢相扣并轻晃，离开松开 */
    .handL,
    .handR {
      transition: transform .3s cubic-bezier(.4, 1.4, .5, 1);
    }

    .handL { transform: translateX(-4.5px); }
    .handR { transform: translateX(4.5px); }

    .teCol:hover .handL,
    .teCol:hover .handR { transform: translateX(0); }

    .teCol:hover .shake { animation: te-shake .55s ease-in-out infinite; }

    @keyframes te-shake {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.6px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .lever, .handL, .handR { transition: none; }
      .sweep { animation: none; }
      .teCol:hover .shake { animation: none; }
    }

    .pxlabel {
      font-family: var(--px);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--peach-deep);
    }

    .pageTitle {
      font-size: clamp(32px, 3.8vw, 48px);
      margin: 0 0 12px;
    }

    .pageLead {
      color: var(--muted);
      font-size: 17px;
      max-width: 60ch;
    }

    .postList {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 0 80px;
    }

    .postCard {
      background: #fff;
      border-radius: var(--r);
      padding: 28px 32px;
      box-shadow: var(--soft-shadow);
      transition: transform .2s ease;
      display: block;
    }

    .postCard:hover {
      transform: translateY(-4px);
    }

    .postDate {
      font-family: var(--px);
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }

    .postTitle {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      margin: 0 0 10px;
    }

    .postExcerpt {
      color: var(--muted);
      font-size: 15.5px;
      line-height: 1.7;
      margin: 0;
    }

    /* ---------- responsive（窄屏头部塌栏） ---------- */
    @media (max-width: 1000px) {
      .teGrid {
        grid-template-columns: 1fr 1fr;
        row-gap: 30px;
      }
    }

    @media (max-width: 560px) {
      .teGrid { grid-template-columns: 1fr; }
      .teHeader { padding: 26px 0; }
      .postCard { padding: 22px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .postCard { transition: none; }
    }
  </style>
</head>

<body>

  <!-- 顶部导航（与 index/posts 完全一致） -->
  <div class="teHeader">
    <div class="wrap">
      <div class="teGrid">
        <div class="teBrand"><a href="index.html">GEORIGIN</a></div>

        <div class="teCol">
          <div class="icon" aria-hidden="true">
            <!-- 拨杆开关：底座 + 枢轴 + 杆 + 旋钮，hover 左拨，离开回弹 -->
            <svg viewBox="0 0 40 40">
              <rect x="11" y="28" width="18" height="6" rx="2" />
              <circle cx="20" cy="30" r="1.2" />
              <g class="lever">
                <line x1="20" y1="30" x2="20" y2="13" />
                <circle cx="20" cy="10" r="3.4" />
              </g>
            </svg>
          </div>
          <h5><a href="index.html#how">product</a></h5>
        </div>

        <div class="teCol">
          <div class="icon" aria-hidden="true">
            <!-- 毫米波雷达：同心圆一圈一圈 + hover 时扫描线旋转 -->
            <svg viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="5" />
              <circle cx="20" cy="20" r="10" />
              <circle cx="20" cy="20" r="15" />
              <circle cx="20" cy="20" r="1.2" />
              <g class="sweep">
                <line x1="20" y1="20" x2="20" y2="5" />
              </g>
            </svg>
          </div>
          <h5><a href="blog.html">blog</a></h5>
        </div>

        <div class="teCol">
          <div class="icon" aria-hidden="true">
            <!-- 握手：左右两只手，hover 合拢相扣并轻晃，离开松开 -->
            <svg viewBox="0 0 40 40">
              <g class="shake">
                <g class="handL">
                  <line x1="2" y1="20" x2="10" y2="20" />
                  <rect x="10" y="16" width="12" height="8" rx="3.5" />
                  <line x1="14" y1="16" x2="14" y2="13" />
                  <line x1="17" y1="16" x2="17" y2="24" />
                  <line x1="20" y1="16" x2="20" y2="24" />
                </g>
                <g class="handR">
                  <line x1="38" y1="24" x2="30" y2="24" />
                  <rect x="18" y="20" width="12" height="8" rx="3.5" />
                  <line x1="26" y1="28" x2="26" y2="31" />
                  <line x1="23" y1="20" x2="23" y2="28" />
                  <line x1="20" y1="20" x2="20" y2="28" />
                </g>
              </g>
            </svg>
          </div>
          <h5><a href="index.html#contact">contact</a></h5>
        </div>
      </div>
    </div>
  </div>

  <header style="padding: 48px 0 32px;">
    <div class="wrap">
      <span class="pxlabel">FROM THE WORKBENCH</span>
      <h1 class="pageTitle">Build Notes</h1>
      <p class="pageLead">All build logs and development notes, sorted by date.</p>
    </div>
  </header>

  <main class="wrap">
    <div class="postList" id="post-list">
      <!-- JS 动态生成所有文章列表 -->
    </div>
  </main>

  <script>
    async function loadAllPosts() {
      try {
        const res = await fetch('posts.json');
        if (!res.ok) throw new Error('posts.json not found');

        let posts = await res.json();

        // 按日期倒序排序
        posts.sort((a, b) => b.date.localeCompare(a.date));

        const container = document.getElementById('post-list');
        container.innerHTML = '';

        posts.forEach(post => {
          const card = document.createElement('a');
          card.className = 'postCard';
          card.href = `posts.html?p=${post.slug}`;

          card.innerHTML = `
            <div class="postDate">${post.date}</div>
            <h2 class="postTitle">${post.title}</h2>
            <p class="postExcerpt">${post.excerpt}</p>
          `;

          container.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        document.getElementById('post-list').innerHTML = 
          '<p style="color:#888;">无法加载文章列表，请检查 posts.json 文件。</p>';
      }
    }

    loadAllPosts();
  </script>

</body>
</html>
